services:
  scrum-fe:
    image: toandeptroai/scrum-fe:latest
    container_name: scrum-fe
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_API_URL: /api
        VITE_BACKEND_URL: ""
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    environment:
      SCRUM_BE_ORIGIN: https://healio.api.tonynyan.id.vn
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${FE_PORT:-5173}:80"
    restart: unless-stopped
